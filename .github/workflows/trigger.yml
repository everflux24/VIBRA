name: Auto Deployment Trigger

on:
  repository_dispatch:
    types: [uprobot-trigger] # UptimeRobotからのAPIを受け取る設定
  workflow_dispatch:        # GitHub画面からの手動実行も残しています

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 最新の変更をリモートから正しく取得するために必要です

      - name: Create empty commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit --allow-empty -m "chore: trigger deployment for news update"
          
          # プッシュ直前にリモートの最新情報を取り込み、その上に空コミットを乗せる
          git pull --rebase origin main
          
          # 安全にプッシュを実行
          git push origin main
