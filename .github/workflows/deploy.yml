name: Build & Deploy Aoaeola

on:
  repository_dispatch:
    types: [uprobot-trigger]
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  pages: write
  id-token: write

concurrency:
  group: aoaeola-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore build meta cache
        uses: actions/cache@v4
        with:
          path: _site/build_meta.json
          key: aoaeola-build-meta-${{ github.run_id }}
          restore-keys: aoaeola-build-meta-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reconstruct core logic from Secrets
        env:
          VIBRA_CORE_1: ${{ secrets.VIBRA_CORE_1 }}
          VIBRA_CORE_2: ${{ secrets.VIBRA_CORE_2 }}
        run: |
          mkdir -p core
          echo "$VIBRA_CORE_1" > core/token_cluster.py
          echo "$VIBRA_CORE_2" > core/hook_reason.py
          echo "✅ Core logic reconstructed"

      - name: Pre-build diagnostic
        run: |
          echo "=== Working Directory ==="
          pwd
          echo "=== Directory Structure ==="
          ls -la
          echo "=== templates/ ==="
          ls -la templates/ 2>/dev/null || echo "❌ templates/ not found"
          echo "=== core/ ==="
          ls -la core/ 2>/dev/null || echo "❌ core/ not found"
          echo "=== Python Path ==="
          python -c "import sys; print('\n'.join(sys.path))"

      - name: Build site
        env:
          VIBRA_OUTPUT_DIR: _site
        run: |
          python local_build.py 2>&1 | tee build.log
          echo "=== BUILD EXIT CODE: $? ==="

      - name: Post-build diagnostic
        run: |
          echo "=== _site Directory Structure ==="
          find _site -type f 2>/dev/null | sort || echo "❌ _site not found"
          echo ""
          echo "=== Archive Directory Check ==="
          if [ -d "_site/archive" ]; then
            echo "✅ _site/archive exists"
            find _site/archive -type f | wc -l
            find _site/archive -type f | head -20
          else
            echo "❌ _site/archive does NOT exist"
          fi
          echo ""
          echo "=== Build Log (last 50 lines) ==="
          tail -50 build.log 2>/dev/null || echo "No build.log"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
