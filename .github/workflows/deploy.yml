name: Build & Deploy Aoaeola

on:
  repository_dispatch:
    types: [uprobot-trigger] # cron-job.orgからの自動トリガーを受け取る設定
  workflow_dispatch:        # GitHub画面から手動で実行する設定
  push:
    branches: [main]        # メインブランチに直接プッシュがあった時も実行する設定

permissions:
  pages: write
  id-token: write

concurrency:
  group: aoaeola-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore build meta cache
        uses: actions/cache@v4
        with:
          path: _site/build_meta.json
          key: aoaeola-build-meta-${{ github.run_id }}
          restore-keys: aoaeola-build-meta-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Reconstruct core logic from Secrets
        env:
          VIBRA_CORE_1: ${{ secrets.VIBRA_CORE_1 }}
          VIBRA_CORE_2: ${{ secrets.VIBRA_CORE_2 }}
        run: |
          mkdir -p core
          echo "$VIBRA_CORE_1" > core/token_cluster.py
          echo "$VIBRA_CORE_2" > core/hook_reason.py
          echo "✅ Core logic reconstructed from Secrets"

      - name: Build site
        env:
          VIBRA_OUTPUT_DIR: _site
        run: python local_build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
